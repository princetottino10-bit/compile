function buildEditedState(){
  var base = JSON.parse(JSON.stringify(cur.state));
  base.turn = parseInt(document.getElementById('edTurn').value, 10);
  base.control = parseInt(document.getElementById('edControl').value, 10);
  document.querySelectorAll('.ed-proto-name').forEach(function(sel){
    base.players[+sel.dataset.s].protocols[+sel.dataset.l].name = sel.value;
  });
  document.querySelectorAll('.ed-proto-comp').forEach(function(cb){
    base.players[+cb.dataset.s].protocols[+cb.dataset.l].compiled = cb.checked;
  });
  for (var p=0;p<2;p++){ base.players[p].hand=[]; base.players[p].deck=[]; base.players[p].trash=[]; }
  base.lines = [[[],[]],[[],[]],[[],[]]];
  document.querySelectorAll('.ed-zone').forEach(function(sel){
    var uid = sel.dataset.uid, c = base.cards[uid], v = sel.value;
    var m = v.match(/^line(\d)(\d)([ud])$/);
    if (m){
      var l = +m[1], s = +m[2];
      c.zone = 'field'; c.faceUp = (m[3] === 'u');
      base.lines[l][s].push(uid);
    } else {
      var zm = v.match(/^(hand|deck|trash)(\d)$/);
      var kind = zm[1], pp = +zm[2];
      c.zone = kind + pp;
      c.faceUp = (kind === 'trash');
      base.players[pp][kind].push(uid);
    }
  });
  return base;
}

function applyEditor(){
  try {
    var st = buildEditedState();
    closeModal();
    loadCustomState(st);
  } catch(e){ toast('エラー: ' + (e && e.message || e)); }
}

function shareEditor(){
  try {
    var url = stateToUrl(buildEditedState());
    var box = document.getElementById('edShareBox');
    box.innerHTML = '<div class="fx-set-lbl">共有リンク</div>'
      + '<textarea class="ed-share-ta" readonly onclick="this.select()">'+esc(url)+'</textarea>'
      + '<button class="optbtn opt-inline" onclick="copyShareUrl()">コピー</button>';
  } catch(e){ toast('エラー: ' + (e && e.message || e)); }
}

function copyShareUrl(){
  var ta = document.querySelector('.ed-share-ta');
  if (!ta) return;
  ta.select();
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value);
    else document.execCommand('copy');
    toast('リンクをコピーしました');
  } catch(e){ toast('コピーできませんでした'); }
}

function stateToUrl(state){
  var b64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  return location.origin + location.pathname + '#p=' + b64;
}

function loadCustomState(state){
  if (aiTimer) clearTimeout(aiTimer);
  cancelPlayback();
  playedCount = 0;
  undoStack = []; fullLog = []; uiMode = 'idle';
  selectedHand = null; selBuf = []; curReq = null; playPick = null; arrPreview = null;
  prevFieldUids = {}; prevHandUids = {};
  document.getElementById('setupOv').classList.remove('on');
  document.getElementById('winOv').classList.remove('on');
  state.phase = 'checkControl';
  state.pending = null;
  state.revealed = null;
  state.winner = null;
  var res = Engine.apply(state, {type:'_begin'});
  pushLog(['詰めCompile: 盤面を読み込みました']);
  onResult(res);
}

function tryLoadShared(){
  var m = /#p=([^&]+)/.exec(location.hash);
  if (!m) return false;
  try {
    var json = decodeURIComponent(escape(atob(m[1])));
    var state = JSON.parse(json);
    if (!state || !state.cards || !state.lines || !state.players || state.players.length !== 2) return false;
    loadCustomState(state);
    return true;
  } catch(e){ return false; }
}

function openDetail(uid){
  if (uiMode === 'anim'){ flushPlayback(); return; }
  var st = view();
  var c = st.cards[uid];
  if (!c) return;
  // AI の裏向きカードは見られない
  var loc = Engine.locate(st, uid);
  if (!c.faceUp && loc && loc.side === AI && c.zone !== 'trash1'){ toast('相手の裏向きカードは見られません'); return; }
  var def = DEFMAP[c.def];
  var color = def.proto.color;
  var rgb = hexToRgb(color);
  var html = '<div class="dt-art" style="background:url(&quot;' + cardArt(c.def) + '&quot;) center/cover">' +
    '<span class="badge" style="background:rgb(' + rgb.join(',') + ')">' + def.card.value + '</span></div>';
  html += '<h2 style="color:' + color + '">' + esc(cardName(c.def)) + '</h2>';
  function cmd(lbl, tx){ return tx ? '<div class="detail-cmd"><span class="lbl">' + lbl + '</span>' + esc(tx) + '</div>' : ''; }
  html += cmd('TOP (常在)', def.card.upper) + cmd('MIDDLE (プレイ時)', def.card.middle) + cmd('BOTTOM (補助)', def.card.lower);
  html += '<button class="optbtn ghost" onclick="closeModal()">閉じる</button>';
  openModal(html);
}

function openTrash(side){
  var st = view();
  var t = st.players[side].trash;
  var html = '<h2>' + (side===0?'あなた':'AI') + 'のトラッシュ (' + t.length + ')</h2>';
  if (!t.length) html += '<div class="sub">空</div>';
  t.slice().reverse().forEach(function(uid){
    html += '<div class="detail-cmd">' + esc(cardName(st.cards[uid].def)) + '</div>';
  });
  html += '<button class="optbtn ghost" onclick="closeModal()">閉じる</button>';
  openModal(html);
}

function renderControlBars(st){
  var top = document.getElementById('ctrlTop'), bot = document.getElementById('ctrlBot');
  top.classList.remove('on'); bot.classList.remove('on');
  if (!st.useControl) return;
  if (st.control === AI){
    top.classList.add('on');
    top.querySelector('.ct-tx').textContent = 'CONTROL — AI 保持';
  } else if (st.control === HUMAN){
    bot.classList.add('on');
    bot.querySelector('.ct-tx').textContent = 'CONTROL — あなたが保持';
  }
}

function renderTurnLog(){
  var el = document.getElementById('turnLog');
  // 直近のターン区切り以降を現ターンのログとして表示
  var start = 0;
  for (var i = fullLog.length - 1; i >= 0; i--){
    if (fullLog[i].indexOf('---') === 0){ start = i; break; }
  }
  var lines = fullLog.slice(start);
  if (!lines.length){ el.innerHTML = ''; return; }
  el.innerHTML = lines.map(function(l, idx){
    var isHd = l.indexOf('---') === 0;
    var isNew = idx === lines.length - 1 && !isHd;
    var txt = isHd ? l.replace(/-/g,'').trim() : prettyMsg(l);
    return '<div class="tl-line ' + (isHd?'tl-hd':'') + (isNew?' new':'') + '">' + esc(txt) + '</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

/* ---------- ログ / 公開情報 / 勝敗 ---------- */
function pushLog(lines){
  (lines||[]).forEach(function(l){ fullLog.push(l); });
  if (fullLog.length > 500) fullLog = fullLog.slice(-400);
}
function openLog(){
  var el = document.getElementById('logList');
  el.innerHTML = fullLog.map(function(l){
    return '<div class="' + (l.indexOf('---')===0?'turn-mark':'') + '">' + esc(prettyMsg(l)) + '</div>';
  }).join('');
  document.getElementById('logOv').classList.add('on');
  el.scrollTop = el.scrollHeight;
}

function maybeReveal(){
  var st = view();
  if (!st || !st.revealed) return;
  var key = JSON.stringify(st.revealed);
  if (key === lastRevealKey) return;
  lastRevealKey = key;
  if (st.revealed.kind === 'hand'){
    var who = (st.revealed.player===AI?'AI':'あなた');
    var html = '<h2>' + esc(who) + 'の手札を公開</h2>';
    if (st.revealed.cards.length){
      html += '<div class="reveal-grid">' + st.revealed.cards.map(function(defId){
        return revealCardHtml(defId);
      }).join('') + '</div>';
    } else {
      html += '<div class="sub">手札はありません。</div>';
    }
    html += '<button class="optbtn ghost" onclick="closeModal()">閉じる</button>';
    openModal(html, 'board');
  } else if (st.revealed.def){
    toast('公開: ' + cardName(st.revealed.def), 3000);
  }
}

function showWin(){
  var w = cur.state.winner;
  var html = '<div class="wtitle" style="color:' + (w===HUMAN?'var(--pk2)':'var(--gd)') + '">' +
    (w===HUMAN ? 'YOU WIN' : 'AI WINS') + '</div>' +
    '<div class="sub">' + (w===HUMAN ? '3つのプロトコルをコンパイルしました！' : 'AIが3つのプロトコルをコンパイルしました') + '</div>' +
    '<button class="bigbtn" onclick="document.getElementById(\'winOv\').classList.remove(\'on\');document.getElementById(\'setupOv\').classList.add(\'on\')">新しいゲーム</button>' +
    '<button class="optbtn ghost" style="margin-top:10px" onclick="document.getElementById(\'winOv\').classList.remove(\'on\')">盤面を見る</button>';
  document.getElementById('winPanel').innerHTML = html;
  document.getElementById('winOv').classList.add('on');
}

var toastTimer = null;
function toast(msg, ms){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.style.display='none'; }, ms || 2200);
}

function optLabel(s){
  if (/[ぁ-んァ-ン一-龥]/.test(s)) return s;
  return s.split('+').map(function(x){ return OP_LABEL[x] || x; }).join(' して ');
}

function esc(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
</script>

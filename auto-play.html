<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COMPILE - Auto Play</title>
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="COMPILE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --pk:#e91e8c;--pk2:#ff2fa0;--gd:#c8a84e;--gd2:#e6c768;--dk:#0d0d14;--dkr:#06060d;
  --cbg:#14141f;--cbg2:#1c1c2b;--tx:#ececf4;--txd:#9a9ab4;--txdd:#5f5f7c;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --dn-bg:rgba(255,255,255,.035);--dn-bd:rgba(255,255,255,.16);
  --cand:#37d67a;--ac:#8a8aa0;--acg:rgba(138,138,160,.5);--act:rgba(138,138,160,.14);
  --fmono:'Orbitron',sans-serif;
  --sh:0 2px 7px rgba(0,0,0,.45);
  --cs:1;   /* カード表示サイズ倍率 */
}
html{-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--dkr);color:var(--tx);
  display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;line-height:1.5;position:relative}
/* 空気感: 上部のネオングロー + ドットグリッド + 微細スキャンライン */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(125% 75% at 50% -12%, rgba(233,30,140,.12), transparent 58%),
    radial-gradient(95% 65% at 102% 112%, rgba(200,168,78,.07), transparent 55%),
    radial-gradient(70% 50% at 0% 100%, rgba(80,90,255,.05), transparent 60%),
    linear-gradient(rgba(255,255,255,.020) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.020) 1px,transparent 1px);
  background-size:auto,auto,auto,30px 30px,30px 30px}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px)}
header,#msgBar,#field,#bottomBar{position:relative;z-index:1}

/* ---------- header ---------- */
header{display:flex;flex-wrap:wrap;align-items:center;gap:7px;padding:7px 11px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(12,12,22,.98),rgba(8,8,16,.92));
  border-bottom:1px solid var(--bd2);box-shadow:0 1px 0 rgba(255,255,255,.04),0 6px 18px -10px rgba(233,30,140,.5)}
.hdr-row1{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.hdr-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo{font-family:var(--fmono);font-weight:900;font-size:.92rem;letter-spacing:.14em;
  text-shadow:0 0 14px rgba(255,255,255,.18)}
.logo b{color:var(--pk2);text-shadow:0 0 12px rgba(233,30,140,.7)}
.hbtn{background:var(--cbg);border:1px solid var(--bd2);color:var(--txd);border-radius:7px;
  padding:5px 11px;font-size:.7rem;font-family:inherit;cursor:pointer;transition:all .15s}
.hbtn:hover{border-color:var(--pk);color:var(--tx)}
.hbtn:active{background:var(--cbg2);transform:translateY(1px)}
.hbtn:disabled{opacity:.3;pointer-events:none}
#turnBadge{margin-left:auto;font-family:var(--fmono);font-weight:700;font-size:.62rem;letter-spacing:.08em;
  color:var(--txd);padding:4px 11px;border-radius:999px;border:1px solid var(--bd2);transition:all .25s}
#turnBadge.me{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--pk),#a3136a);
  box-shadow:0 0 16px -3px rgba(233,30,140,.8)}
#turnBadge.ai{color:#1a1a14;border-color:transparent;background:linear-gradient(135deg,var(--gd2),var(--gd));
  box-shadow:0 0 16px -4px rgba(200,168,78,.7)}
#ctrlBadge{font-family:var(--fmono);font-size:.58rem;letter-spacing:.06em;padding:4px 9px;border-radius:999px;
  border:1px dashed var(--bd2);color:var(--txdd);transition:all .25s}
#ctrlBadge.me{color:var(--pk2);border-color:var(--pk);border-style:solid;box-shadow:0 0 12px -4px rgba(233,30,140,.7)}
#ctrlBadge.ai{color:var(--gd2);border-color:var(--gd);border-style:solid;box-shadow:0 0 12px -4px rgba(200,168,78,.6)}

/* ---------- コントロール帯 (所有側の端に表示) ---------- */
.ctrlbar{flex-shrink:0;display:none;align-items:center;justify-content:center;gap:9px;padding:5px 12px;z-index:1;
  font-family:var(--fmono);font-weight:900;font-size:.6rem;letter-spacing:.18em;color:#241d05;position:relative;
  background:linear-gradient(90deg,transparent,var(--gd) 18%,var(--gd2) 50%,var(--gd) 82%,transparent);
  box-shadow:0 0 20px -3px rgba(200,168,78,.85)}
.ctrlbar.on{display:flex;animation:ctrlpulse 1.8s ease-in-out infinite}
.ctrlbar .ct-ico{font-size:.82rem;line-height:1}
@keyframes ctrlpulse{50%{box-shadow:0 0 30px 0 rgba(200,168,78,.95)}}
#ctrlTop.on{animation-name:ctrlpulse}
/* 自分側(下)はピンク寄りにして所有がより明確に */
#ctrlBot.on{background:linear-gradient(90deg,transparent,var(--gd) 18%,var(--gd2) 50%,var(--gd) 82%,transparent)}

/* ---------- message bar ---------- */
#msgBar{flex-shrink:0;padding:8px 13px;font-size:.8rem;min-height:38px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(90deg,rgba(233,30,140,.14),rgba(233,30,140,.04));
  border-bottom:1px solid rgba(233,30,140,.22);position:relative}
#msgBar::before{content:"›";font-family:var(--fmono);font-weight:900;color:var(--pk2);margin-right:-2px}
#msgBar.quiet{background:transparent;border-bottom-color:var(--bd);color:var(--txd)}
#msgBar.quiet::before{color:var(--txdd)}
#msgBar .mb-btn{background:var(--cbg);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);
  padding:5px 15px;font-size:.72rem;font-family:inherit;cursor:pointer;transition:all .15s}
#msgBar .mb-btn:hover{border-color:var(--pk)}
#msgBar .mb-btn.pri{border-color:var(--pk);color:#fff;background:linear-gradient(135deg,var(--pk),#a3136a);
  box-shadow:0 0 14px -4px rgba(233,30,140,.8)}
#msgBar .mb-btn:disabled{opacity:.3}

/* ---------- field ---------- */
#field{flex:1;display:flex;gap:7px;padding:6px 9px;min-height:0;overflow-y:auto}
/* グリッドの 1fr auto 1fr で中央行(プロトコル)位置を完全固定する */
.line{flex:1;display:grid;grid-template-rows:1fr auto 1fr;min-width:0;position:relative;padding:6px;border-radius:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));
  border:1px solid var(--bd);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 24px -16px #000;overflow:hidden}
/* カードが増えてラインに収まらない場合は、覆われたカード側へスクロールして確認できるようにする */
.half{min-height:0;display:flex;flex-direction:column;position:relative;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.18) transparent}
.half::-webkit-scrollbar{width:4px}
.half::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.half::-webkit-scrollbar-track{background:transparent}
/* safe を付け、カードが多くスタックが溢れた場合は外側(uncovered側)を優先して表示する */
.half.top{justify-content:safe flex-end}     /* AIスタックを中央(プロト)側へ寄せる */
.half.bot{justify-content:safe flex-start}   /* YOUスタックを中央(プロト)側へ寄せる */
.lcenter{position:relative;z-index:6}
.line.cand{border-color:var(--cand);box-shadow:0 0 0 1px var(--cand),0 0 22px -6px var(--cand);cursor:pointer}
.line.cand::after{content:"▶ ここに";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--fmono);font-size:.6rem;letter-spacing:.1em;color:var(--cand);pointer-events:none;
  text-shadow:0 0 10px var(--cand);opacity:.9}
.proto{position:relative;font-family:var(--fmono);font-size:calc(.64rem*var(--cs));font-weight:700;letter-spacing:.09em;
  text-align:center;padding:8px 4px;border-radius:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#fff;border:1px solid var(--acg);
  background:linear-gradient(180deg,var(--act),transparent);
  text-shadow:0 0 10px var(--acg),0 1px 4px #000}
.proto.comp{color:#fff;border-color:var(--ac);
  background:linear-gradient(180deg,var(--ac),var(--act));
  box-shadow:0 0 20px -3px var(--acg),inset 0 0 12px -4px rgba(255,255,255,.5)}
.proto.comp::after{content:"  ✓ COMPILED";font-size:.52rem;opacity:.9}
/* スタックはプロトコルに密着し、カードは重なって連なる */
/* flex-shrink:0 で本来の高さを保ち、収まらない分は親.halfのスクロールに委ねる */
.stack{display:flex;flex-direction:column;gap:0;padding:0;min-height:0;position:relative;flex-shrink:0}
.stack.p2s{flex-direction:column-reverse}   /* AI: uncovered を外側(上)に */
.stack.p1s{flex-direction:column}           /* YOU: uncovered を外側(下/手札側)に */
.stack .chip{position:relative}
/* 覆われたカードどうしは重ねて、上側(値+上段)だけ覗かせる */
.stack.p1s .chip.cov + .chip{margin-top:-4px}
.stack.p2s .chip.cov + .chip{margin-top:-4px}
/* AI側のuncoveredはスタック最上端(=.halfの上端)に来るため、負マージンで上にはみ出させない */
.stack.p2s .chip.cov + .chip:not(.cov){margin-top:0}
/* uncovered のフルカードは隣接する覆われカードの上に出す */
.stack .chip:not(.cov){z-index:5}
.proto{position:relative;z-index:6}
/* レーンゲージ: 各サイドの値を10へ向けて可視化 */
.totals{display:flex;flex-direction:column;gap:3px;padding:5px 2px;margin:2px 0;
  border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.gauge{display:flex;align-items:center;gap:5px;font-size:.6rem}
.gauge .lbl{font-family:var(--fmono);font-weight:700;letter-spacing:.05em;width:24px;flex-shrink:0}
.gauge .num{font-family:var(--fmono);font-weight:900;font-size:.74rem;width:18px;text-align:center;flex-shrink:0}
.gauge .bar{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.gauge .bar i{display:block;height:100%;border-radius:3px;transition:width .4s cubic-bezier(.16,1,.3,1)}
.gauge.g2{flex-direction:row-reverse}
.gauge.t1 .bar i{background:linear-gradient(90deg,var(--pk),var(--pk2));box-shadow:0 0 8px -1px var(--pk)}
.gauge.t2 .bar i{background:linear-gradient(90deg,var(--gd),var(--gd2));box-shadow:0 0 8px -1px var(--gd)}
.gauge.t1{color:var(--pk2)} .gauge.t2{color:var(--gd2)}
.gauge.ready .num{animation:pulse 1.1s ease-in-out infinite}
.gauge.ready .bar i{box-shadow:0 0 12px 0 currentColor}
@keyframes pulse{50%{opacity:.5}}

/* ---------- chips (場のカード) ---------- */
/* 手札カードと同じ「上段=値+名前 / 下段=効果文」構造で、表裏とも上揃えに統一 */
.chip{display:flex;flex-direction:column;gap:2px;align-items:stretch;border-radius:8px;padding:5px 7px;font-size:calc(.66rem*var(--cs));cursor:pointer;position:relative;
  border:1px solid var(--bd2);background:linear-gradient(150deg,var(--cbg2),var(--cbg));box-shadow:var(--sh);
  transition:transform .12s,box-shadow .2s,border-color .2s,opacity .2s,filter .2s}
.chip .top{display:flex;align-items:center;gap:7px}
.chip .badge{flex-shrink:0;width:calc(26px*var(--cs));height:calc(26px*var(--cs));padding:0 3px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fmono);font-weight:900;font-size:calc(.95rem*var(--cs));line-height:1;color:#fff;border-radius:6px;
  background:linear-gradient(160deg,var(--act),rgba(0,0,0,.28));border:1px solid var(--acg);text-shadow:0 0 9px var(--acg)}
.chip .nm{flex:1;min-width:0;text-align:left;font-weight:700;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 4px #000,0 0 2px #000}
.chip .tx{color:#d6d6e4;text-align:left;font-size:calc(.58rem*var(--cs));line-height:1.25;max-height:2.5em;overflow:hidden;text-shadow:0 1px 3px #000}
/* 上段/下段効果の有無を示す最小アイコン (詳細はホバー/タップで表示) */
.eff{display:flex;align-items:center;gap:5px;flex-shrink:0;font-size:calc(.62rem*var(--cs));line-height:1;font-family:var(--fmono);font-weight:900}
.eff .e-up{color:#f87171;text-shadow:0 0 6px rgba(248,113,113,.6)}
.eff .e-low{color:#4ade80;text-shadow:0 0 6px rgba(74,222,128,.6)}
.chip .eff{margin-left:auto;padding-left:4px}
.chip.dn{border-style:dashed;color:var(--txdd);
  background:repeating-linear-gradient(45deg,var(--dn-bg) 0 5px,transparent 5px 11px),var(--cbg)}
.chip.dn .badge{color:var(--txd);background:rgba(255,255,255,.05);border-color:var(--dn-bd);text-shadow:none}
/* 覆われたカード: コンパクト。上段(値+名前)に加え、上段コマンドを1行だけ表示 */
.chip.cov{padding:3px 7px;opacity:.96}
.chip.dn.cov{background:repeating-linear-gradient(45deg,var(--dn-bg) 0 5px,transparent 5px 11px),var(--cbg)}
.chip.cov .badge{width:calc(20px*var(--cs));height:calc(20px*var(--cs));font-size:calc(.74rem*var(--cs));padding:2px 3px;border-radius:4px}
.chip.cov .tx{font-size:calc(.52rem*var(--cs));line-height:1.2;max-height:1.3em;white-space:nowrap;opacity:.85;color:#c0c0d4}
.chip.cov .tx::before{content:"▲ ";color:var(--ac);opacity:.9}
.chip.up.p1c:not(.cov){border-color:rgba(233,30,140,.5);box-shadow:var(--sh),0 0 15px -6px rgba(233,30,140,.75)}
.chip.up.p2c:not(.cov){border-color:rgba(200,168,78,.45);box-shadow:var(--sh),0 0 15px -6px rgba(200,168,78,.6)}
.chip.cand{border-color:var(--cand)!important;box-shadow:0 0 0 1.5px var(--cand),0 0 18px -4px var(--cand)!important;cursor:pointer}
.chip.cand:hover{transform:translateY(-2px)}
.chip.selbuf{border-color:#ffd24a!important;box-shadow:0 0 0 1.5px #ffd24a,0 0 18px -4px #ffd24a!important}
.chip.flash,.hcard.flash{animation:chipflash .6s ease}
@keyframes chipflash{0%{box-shadow:0 0 0 3px #fff,0 0 26px 2px var(--acg);filter:brightness(1.9)}100%{filter:none}}
/* 札が「ピロッ」と飛び出す登場演出 (オーバーシュート付き) */
.chip.pop{animation:cardpop .34s cubic-bezier(.34,1.56,.64,1);transform-origin:center bottom}
.hcard.pop{animation:cardpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardpop{
  0%{opacity:0;transform:scale(.5) translateY(-12px)}
  55%{opacity:1;transform:scale(1.1) translateY(0)}
  75%{transform:scale(.96)}
  100%{transform:scale(1)}}
/* 手札→場の飛行ゴースト */
.flyghost{border-radius:11px;overflow:hidden;will-change:transform,opacity;
  box-shadow:0 0 30px -4px var(--acg),0 16px 44px -12px #000!important}
#msgBar.anim{background:linear-gradient(90deg,rgba(55,214,122,.16),rgba(55,214,122,.04));border-bottom-color:rgba(55,214,122,.4)}
#msgBar.anim::before{content:"⚡";color:var(--cand)}
/* 手札選択中: ライン全体を大きなタップ領域にし、対象外のラインは控えめにする */
.line.playable{cursor:pointer;border-color:var(--pk2);
  box-shadow:0 0 0 1.5px var(--pk2),0 0 26px -6px rgba(233,30,140,.85);
  animation:lineready 1.4s ease-in-out infinite}
@keyframes lineready{50%{box-shadow:0 0 0 1.5px var(--pk2),0 0 38px -2px rgba(233,30,140,1)}}
.line.playable:active{transform:scale(.985)}
.line.not-target{opacity:.36;filter:saturate(.4)}
.play-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;
  max-width:92%;text-align:center;font-family:var(--fmono);font-size:.6rem;font-weight:700;
  letter-spacing:.06em;line-height:1.3;color:#fff;
  background:linear-gradient(135deg,var(--pk),#a3136a);padding:5px 9px;border-radius:999px;
  box-shadow:0 4px 18px -4px rgba(233,30,140,.9);pointer-events:none;text-shadow:0 1px 3px #000}
.play-choice{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9;
  display:flex;flex-direction:column;gap:5px;background:rgba(10,10,16,.94);border:1px solid var(--bd2);border-radius:10px;
  padding:5px;box-shadow:0 10px 30px -8px #000;max-width:94%;width:max-content}
.play-choice button{font-family:inherit;font-size:.7rem;font-weight:700;padding:8px 12px;border-radius:7px;
  white-space:nowrap;border:1px solid var(--pk);color:#fff;background:linear-gradient(135deg,var(--pk),#a3136a);cursor:pointer;
  box-shadow:0 0 14px -5px rgba(233,30,140,.8);transition:transform .12s}
.play-choice button:active{transform:translateY(1px)}
.play-choice button.dnb{background:var(--cbg2);border-color:var(--bd2);color:var(--txd);box-shadow:none}

/* ---------- 詰めCompile編集 ---------- */
.ed-sel{background:var(--cbg2);border:1px solid var(--bd2);color:var(--tx);border-radius:7px;
  padding:6px 8px;font-family:inherit;font-size:.72rem;cursor:pointer}
.ed-sel:focus{border-color:var(--pk)}
.ed-proto-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ed-proto-tag{font-family:var(--fmono);font-size:.6rem;letter-spacing:.06em;color:var(--txd);
  min-width:54px;flex-shrink:0}
.ed-proto-row .ed-sel{flex:1;min-width:0}
.ed-comp{display:flex;align-items:center;gap:4px;font-size:.66rem;color:var(--txd);white-space:nowrap;cursor:pointer}
.ed-comp input{accent-color:var(--pk)}
.ed-cards{margin-bottom:10px}
.ed-hint{font-size:.64rem;color:var(--txd);line-height:1.5;margin-bottom:8px}
.ed-zone-group{display:flex;flex-direction:column;gap:6px;padding:8px;border:1px solid var(--bd2);
  border-radius:9px;background:rgba(255,255,255,.02);margin-bottom:12px}
.ed-card-row{display:flex;align-items:center;gap:8px}
.ed-chip{font-family:var(--fmono);font-size:.6rem;font-weight:700;letter-spacing:.04em;
  padding:6px 8px;border-radius:7px;min-width:84px;flex-shrink:0;text-align:center;
  background:linear-gradient(180deg,var(--act),transparent);border:1px solid var(--ac,var(--bd2));color:var(--ac,var(--tx))}
.ed-card-row .ed-sel{flex:1;min-width:0}
.ed-order{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.ed-order button{width:24px;height:18px;line-height:1;padding:0;font-size:.62rem;font-family:inherit;
  background:var(--cbg2);border:1px solid var(--bd2);color:var(--txd);border-radius:4px;cursor:pointer}
.ed-order button:active{background:var(--bd2);color:var(--tx)}
.ed-order button:disabled{opacity:.22;cursor:default}
.ed-share-ta{width:100%;background:var(--cbg2);border:1px solid var(--bd2);color:var(--tx);
  border-radius:8px;padding:8px;font-family:var(--fmono);font-size:.6rem;line-height:1.5;
  resize:none;height:64px;margin-bottom:8px;word-break:break-all}

/* ---------- bottom ---------- */
#bottomBar{flex-shrink:0;border-top:1px solid var(--bd2);
  background:linear-gradient(180deg,rgba(20,20,32,.6),var(--dk));
  box-shadow:0 -6px 20px -12px rgba(233,30,140,.5)}
/* 現在ターンのログ(ティッカー) */
#turnLog{font-family:'Noto Sans JP',monospace;font-size:.6rem;line-height:1.5;color:var(--txd);
  max-height:42px;overflow-y:auto;padding:4px 11px;border-bottom:1px solid var(--bd);cursor:pointer;
  scrollbar-width:thin;display:flex;flex-direction:column;gap:1px}
#turnLog::-webkit-scrollbar{width:4px}
#turnLog::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
#turnLog:empty{display:none}
#turnLog .tl-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#turnLog .tl-line.new{color:var(--cand)}
#turnLog .tl-hd{color:var(--pk2);font-family:var(--fmono);font-size:.55rem;letter-spacing:.06em}
#sideInfo{display:flex;gap:13px;align-items:center;font-size:.62rem;color:var(--txd);padding:5px 11px;
  border-bottom:1px solid var(--bd);font-family:var(--fmono);letter-spacing:.03em}
#sideInfo .zone{cursor:pointer;transition:color .15s}
#sideInfo .zone b{color:var(--tx);font-weight:700}
#sideInfo .zone:hover{color:var(--tx)}
#sideInfo .ai-tag{color:var(--gd2)}
#sideInfo .ai-tag b{color:var(--gd2)}
#hand{display:flex;gap:7px;overflow-x:auto;padding:7px 9px;min-height:76px;align-items:stretch}
#hand::-webkit-scrollbar{height:5px}
#hand::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px}
.hcard{width:calc(138px*var(--cs));flex-shrink:0;position:relative;cursor:pointer;display:flex;flex-direction:column;
  background:linear-gradient(160deg,var(--cbg2),var(--cbg));border:1px solid var(--bd2);
  border-radius:11px;padding:7px 9px 8px;font-size:calc(.66rem*var(--cs));box-shadow:var(--sh);overflow:hidden;
  transition:transform .14s cubic-bezier(.16,1,.3,1),box-shadow .2s,border-color .2s}
.hcard::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--ac);box-shadow:0 0 10px var(--acg)}
.hcard .top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.hcard .badge{flex-shrink:0;min-width:calc(26px*var(--cs));height:calc(26px*var(--cs));padding:0 5px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fmono);font-weight:900;font-size:calc(1.05rem*var(--cs));line-height:1;color:#fff;border-radius:7px;
  background:linear-gradient(160deg,var(--act),rgba(0,0,0,.3));border:1px solid var(--acg);text-shadow:0 0 10px var(--acg)}
.hcard .nm{font-family:var(--fmono);font-weight:700;font-size:calc(.66rem*var(--cs));letter-spacing:.02em;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff;text-shadow:0 1px 5px #000,0 0 3px #000}
.hcard .info{flex-shrink:0;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fmono);font-weight:900;font-size:.64rem;color:var(--txd);background:rgba(255,255,255,.07);
  border:1px solid var(--bd2)}
.hcard .info:active{background:rgba(255,255,255,.2);color:var(--tx)}
.hcard .tx{color:#e2e2ee;font-size:calc(.66rem*var(--cs));line-height:1.42;flex:1;overflow:hidden;text-shadow:0 1px 4px #000;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}
.hcard .eff{min-height:calc(.95em*var(--cs))}
.hcard:hover{transform:translateY(-4px);border-color:var(--pk);box-shadow:var(--sh),0 0 20px -6px rgba(233,30,140,.65)}
.hcard.sel{border-color:var(--pk2);transform:translateY(-7px);box-shadow:0 0 0 1.5px var(--pk2),0 0 26px -4px rgba(233,30,140,.85)}
.hcard.cand{border-color:var(--cand);box-shadow:0 0 0 1.5px var(--cand),0 0 20px -5px var(--cand)}
.hcard.selbuf{border-color:#ffd24a;box-shadow:0 0 0 1.5px #ffd24a,0 0 20px -5px #ffd24a}
/* モバイル縦持ち: 手札カードを大きくしてカード文章を読みやすくする */
@media (max-width:520px){
  #hand{min-height:86px}
  .hcard{width:calc(158px*var(--cs))}
  /* 縦持ちでは操作ボタン群を2段目に折り返し、上部メニューを欠けさせない */
  header{padding:6px 9px}
  .hdr-actions{flex-basis:100%;justify-content:flex-end}
  /* 場の表示エリアを少しでも稼ぐため、ログ・サイド情報・メッセージ帯を圧縮 */
  #turnLog{max-height:26px}
  #sideInfo{padding:3px 11px}
  #msgBar{min-height:32px;padding:6px 13px}
  /* 盤面全体を縮小して、枚数が増えても画面に収まりやすくする */
  #field{--cs:.82;gap:4px;padding:4px 5px}
  .line{padding:4px}
  .proto{padding:6px 4px}
  .totals{padding:3px 2px;margin:1px 0}
  .chip{padding:4px 6px}
  .chip.cov{padding:2px 6px}
}

/* ---------- overlays ---------- */
.ov{position:fixed;inset:0;background:rgba(4,4,10,.9);
  display:none;z-index:50;align-items:center;justify-content:center;padding:18px}
.ov.on{display:flex;animation:ovin .25s ease}
@keyframes ovin{from{opacity:0}to{opacity:1}}
/* 選択中の下部フローティング確定バー */
#actionBar{position:fixed;left:50%;bottom:108px;transform:translateX(-50%);z-index:46;display:none;
  align-items:center;gap:10px;padding:8px 10px 8px 16px;border-radius:999px;
  background:linear-gradient(180deg,rgba(24,24,38,.98),rgba(14,14,24,.98));
  border:1px solid var(--bd2);box-shadow:0 12px 36px -8px #000,0 0 0 1px rgba(233,30,140,.25),0 0 28px -8px rgba(233,30,140,.5)}
#actionBar.on{display:flex;animation:abpop .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes abpop{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translateX(-50%)}}
#actionBar #abText{font-size:.74rem;color:var(--tx);font-weight:500;white-space:nowrap}
#actionBar .ab-btn{font-family:inherit;font-size:.78rem;font-weight:700;border-radius:999px;padding:8px 18px;cursor:pointer;
  border:1px solid var(--bd2);background:var(--cbg2);color:var(--txd)}
#actionBar .ab-btn:active{transform:translateY(1px)}
#actionBar .ab-btn.pri{border-color:transparent;color:#fff;background:linear-gradient(135deg,var(--pk),#a3136a);
  box-shadow:0 0 16px -3px rgba(233,30,140,.8)}
#actionBar .ab-btn.pri:disabled{opacity:.4;box-shadow:none}
/* 盤面を見せるモード: 背景透過 + パネルを下部に寄せる */
.ov.board-visible{background:transparent;align-items:flex-end;padding:0;pointer-events:none}
.ov.board-visible .panel{pointer-events:auto;max-width:520px;border-radius:16px 16px 0 0;max-height:46vh;padding:14px 18px;
  box-shadow:0 -16px 50px -10px rgba(0,0,0,.85),0 0 0 1px rgba(233,30,140,.25);
  animation:sheetup .25s cubic-bezier(.16,1,.3,1)}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel{background:linear-gradient(180deg,var(--cbg2),var(--cbg));border:1px solid var(--bd2);border-radius:16px;
  max-width:480px;width:100%;max-height:86vh;overflow-y:auto;padding:20px;position:relative;
  box-shadow:0 24px 70px -20px #000,0 0 0 1px rgba(255,255,255,.03),inset 0 1px 0 rgba(255,255,255,.05)}
.panel h2{font-family:var(--fmono);font-size:.98rem;letter-spacing:.1em;margin-bottom:13px;
  text-shadow:0 0 14px rgba(255,255,255,.14)}
.panel h2 b{color:var(--pk2);text-shadow:0 0 12px rgba(233,30,140,.7)}
.panel .sub{font-size:.74rem;color:var(--txd);margin-bottom:14px;line-height:1.6}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.pchip{position:relative;border:1px solid var(--bd2);border-radius:9px;padding:10px 4px;text-align:center;cursor:pointer;
  font-family:var(--fmono);font-size:.6rem;font-weight:700;letter-spacing:.04em;overflow:hidden;
  background:linear-gradient(180deg,var(--act),transparent);transition:transform .14s,box-shadow .2s,border-color .2s}
.pchip::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--ac);opacity:.6}
.pchip:hover{transform:translateY(-2px);border-color:var(--ac)}
.pchip.sel{border-color:var(--ac);color:#fff;background:linear-gradient(180deg,var(--ac),var(--act));
  box-shadow:0 0 20px -4px var(--acg),inset 0 0 16px -6px rgba(255,255,255,.6)}
.pchip.sel::before{opacity:1;box-shadow:0 0 10px var(--ac)}
.pchip small{display:block;font-family:'Noto Sans JP',sans-serif;font-weight:400;color:var(--txdd);
  font-size:.54rem;margin-top:4px;letter-spacing:0;line-height:1.3}
.pchip.sel small{color:rgba(255,255,255,.8)}
.row{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:.78rem;color:var(--txd)}
.row input{accent-color:var(--pk)}
.bigbtn{width:100%;background:linear-gradient(135deg,var(--pk),#a3136a);border:none;color:#fff;
  font-family:var(--fmono);font-weight:700;letter-spacing:.12em;font-size:.85rem;
  border-radius:11px;padding:14px 0;cursor:pointer;margin-top:6px;position:relative;overflow:hidden;
  box-shadow:0 0 24px -6px rgba(233,30,140,.85);transition:transform .12s,box-shadow .2s}
.bigbtn:not(:disabled):hover{box-shadow:0 0 32px -4px rgba(233,30,140,1)}
.bigbtn:not(:disabled):active{transform:translateY(1px)}
.bigbtn:disabled{opacity:.32;box-shadow:none;cursor:default}
.optbtn{display:block;width:100%;background:var(--cbg2);border:1px solid var(--bd2);color:var(--tx);
  border-radius:10px;padding:12px 13px;font-size:.8rem;font-family:inherit;cursor:pointer;margin-bottom:8px;
  text-align:left;transition:all .15s}
.optbtn:hover{border-color:var(--pk);transform:translateX(2px)}
.optbtn.ghost{color:var(--txd);border-style:dashed}
.optbtn.sel-opt{border-color:var(--pk);color:#fff;background:linear-gradient(135deg,rgba(233,30,140,.25),rgba(233,30,140,.08));box-shadow:0 0 14px -5px rgba(233,30,140,.7)}
.fx-set-lbl{font-family:var(--fmono);font-size:.58rem;letter-spacing:.1em;color:var(--txdd);margin:10px 0 6px}
.fx-row-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.optbtn.opt-inline{width:auto;flex:1 1 auto;margin-bottom:0;padding:9px 10px;text-align:center;font-size:.74rem}
/* カード詳細モーダル: カード画像 */
.dt-art{width:100%;height:160px;border-radius:11px;background-size:cover;background-position:center;
  margin-bottom:12px;position:relative;box-shadow:var(--sh)}
.dt-art .badge{position:absolute;top:8px;left:8px;width:32px;height:32px;border-radius:7px;display:flex;
  align-items:center;justify-content:center;font-family:var(--fmono);font-weight:900;font-size:1.05rem;color:#fff;
  text-shadow:0 1px 4px #000}
.detail-cmd{border:1px solid var(--bd);border-radius:9px;padding:8px 11px;margin-bottom:8px;font-size:.74rem;
  background:rgba(255,255,255,.02)}
.detail-cmd .lbl{font-size:.56rem;color:var(--txdd);display:inline-block;min-width:30px;letter-spacing:.1em;font-family:var(--fmono);margin-right:4px}
.detail-cmd b{display:block;margin-bottom:3px}
.detail-cmd>div{margin-top:2px}
.m-proto{font-size:.66rem;font-weight:500;padding:3px 9px;border-radius:6px;display:inline-block;margin:6px 0 4px}
/* 手札公開モーダル: ピーピング時にしっかり読めるカードグリッド表示 (アート+全文) */
.reveal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px;margin-bottom:14px}
.reveal-card{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--bd2);
  display:flex;gap:8px;padding:8px;box-shadow:var(--sh);background:var(--cbg2)}
.reveal-card .art{flex-shrink:0;width:58px;height:78px;border-radius:7px;position:relative;background-size:cover;background-position:center}
.reveal-card .badge{position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:5px;display:flex;
  align-items:center;justify-content:center;font-family:var(--fmono);font-weight:900;font-size:.78rem;color:#fff;
  text-shadow:0 1px 4px #000}
.reveal-card .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;min-height:0}
.reveal-card .nm{font-family:var(--fmono);font-size:.7rem;font-weight:700;color:#fff;line-height:1.3}
.reveal-card .tx{font-size:.62rem;line-height:1.35;color:#d6d6e4}
.reveal-card .tx .lbl{font-size:.5rem;color:var(--txdd);letter-spacing:.08em;font-family:var(--fmono);
  margin-right:4px;display:inline-block;min-width:26px}
.reveal-card .tx>div{margin-top:2px}
#logList{font-size:.7rem;color:var(--txd);line-height:1.7;max-height:60vh;overflow-y:auto;font-family:'Noto Sans JP',monospace}
#logList .turn-mark{color:var(--pk2);font-weight:600;margin-top:6px;font-family:var(--fmono);letter-spacing:.04em}
/* 効果フロートウインドウ */
#fxFloat{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);z-index:48;display:none;
  width:min(330px,86vw);background:linear-gradient(180deg,rgba(22,22,34,.98),rgba(12,12,20,.98));
  border:1px solid var(--bd2);border-radius:14px;padding:13px 15px;pointer-events:none;
  box-shadow:0 22px 60px -16px #000,0 0 0 1px rgba(255,255,255,.05),0 0 40px -10px var(--acg,rgba(233,30,140,.5))}
#fxFloat.on{display:block;animation:fxin .22s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fxin{from{opacity:0;transform:translate(-50%,-46%) scale(.88)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#fxFloat .fx-card{display:flex;align-items:center;gap:9px;margin-bottom:9px}
#fxFloat .fx-badge{flex-shrink:0;min-width:30px;height:30px;padding:0 6px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fmono);font-weight:900;font-size:1.1rem;color:#fff;border-radius:7px;
  background:linear-gradient(160deg,var(--act),rgba(0,0,0,.3));border:1px solid var(--acg);text-shadow:0 0 10px var(--acg)}
#fxFloat .fx-nm{flex:1;font-family:var(--fmono);font-weight:700;font-size:.82rem;letter-spacing:.03em;color:var(--ac);
  text-shadow:0 0 12px var(--acg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#fxFloat .fx-fire{flex-shrink:0;font-family:var(--fmono);font-weight:900;font-size:.6rem;letter-spacing:.1em;color:#fff;
  padding:3px 8px;border-radius:999px;background:linear-gradient(135deg,var(--pk),#a3136a);box-shadow:0 0 14px -3px rgba(233,30,140,.9)}
#fxFloat .fx-slots{display:flex;flex-direction:column;gap:5px}
#fxFloat .fx-slot{border-radius:9px;padding:7px 11px;font-size:.72rem;line-height:1.45;border-left:3px solid;transition:opacity .2s}
#fxFloat .fx-slot.dim{opacity:.34;filter:saturate(.6)}
#fxFloat .fx-slot.active{box-shadow:0 0 0 1.5px currentColor,0 0 16px -4px currentColor}
#fxFloat .fx-slot-lbl{font-family:var(--fmono);font-weight:700;font-size:.54rem;letter-spacing:.1em;display:block;margin-bottom:2px}
#fxFloat .fx-tx{color:#e6e6f0}
#fxFloat .fx-up{background:rgba(239,68,68,.13);border-color:#f87171;color:#f87171}
#fxFloat .fx-mid{background:rgba(59,130,246,.14);border-color:#60a5fa;color:#60a5fa}
#fxFloat .fx-low{background:rgba(34,197,94,.13);border-color:#4ade80;color:#4ade80}
/* 移動中(コミット)カード: 効果解決の途中で盤面から離れているカードを浮遊表示 */
#transitBar{position:fixed;left:50%;top:44%;transform:translateX(-50%);z-index:47;display:none;
  flex-direction:column;gap:5px;align-items:center;pointer-events:none}
#transitBar.on{display:flex;animation:fxin .2s ease}
#transitBar .tr-lbl{font-family:var(--fmono);font-size:.56rem;font-weight:700;letter-spacing:.14em;
  color:#ffd24a;text-shadow:0 0 10px rgba(255,210,74,.7)}
#transitBar .tr-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:9px;
  background:linear-gradient(180deg,rgba(28,24,12,.97),rgba(16,14,8,.97));border:1.5px dashed #ffd24a;
  box-shadow:0 12px 40px -10px #000,0 0 24px -6px rgba(255,210,74,.6)}
#transitBar .tr-badge{min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fmono);font-weight:900;font-size:.92rem;color:#fff;border-radius:6px;
  background:rgba(255,210,74,.18);border:1px solid rgba(255,210,74,.6)}
#transitBar .tr-nm{font-family:var(--fmono);font-weight:700;font-size:.74rem;color:#ffe9a8}
#toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:rgba(18,18,30,.97);
  border:1px solid var(--bd2);border-radius:10px;padding:9px 20px;font-size:.76rem;z-index:99;display:none;max-width:90vw;
  box-shadow:0 10px 30px -8px #000,0 0 0 1px rgba(233,30,140,.2)}
/* カード詳細ツールチップ (PC: マウスオーバーでカード画像+全文を表示) */
#cardTip{position:fixed;z-index:60;display:none;pointer-events:none;width:240px;
  background:linear-gradient(180deg,rgba(22,22,34,.98),rgba(12,12,20,.98));
  border:1px solid var(--bd2);border-radius:11px;padding:10px;
  box-shadow:0 16px 44px -12px #000,0 0 0 1px rgba(255,255,255,.04)}
#cardTip.on{display:block}
#cardTip .ct-art{width:100%;height:120px;border-radius:8px;background-size:cover;background-position:center;
  margin-bottom:8px;position:relative}
#cardTip .ct-badge{position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:6px;display:flex;
  align-items:center;justify-content:center;font-family:var(--fmono);font-weight:900;font-size:.9rem;color:#fff;
  text-shadow:0 1px 4px #000}
#cardTip .ct-nm{font-family:var(--fmono);font-weight:700;font-size:.78rem;margin-bottom:6px;color:#fff}
#cardTip .detail-cmd{margin-bottom:6px;font-size:.68rem}
#cardTip .detail-cmd:last-child{margin-bottom:0}
/* プロトコル並び替え (横並びスワップ) */
.arr-hint{font-size:.72rem;color:var(--txd);text-align:center;margin-bottom:8px;line-height:1.5}
.arr-row{display:flex;gap:8px;margin:4px 0 12px;justify-content:center}
.arr-slot{flex:1;min-width:0;border:1.5px solid var(--acg,var(--bd2));border-radius:10px;padding:12px 4px;text-align:center;
  cursor:pointer;position:relative;background:linear-gradient(180deg,var(--act,rgba(255,255,255,.04)),transparent);
  transition:transform .12s,box-shadow .2s}
/* 並び替え対象の盤面プロトコルを強調 */
.proto.arr-target{box-shadow:0 0 0 2px var(--pk),0 0 22px -4px rgba(233,30,140,.7);animation:arrpulse 1.1s ease-in-out infinite}
@keyframes arrpulse{50%{box-shadow:0 0 0 2px var(--pk2),0 0 30px -2px rgba(233,30,140,.9)}}
.arr-slot .pos{font-family:var(--fmono);font-size:.48rem;color:var(--txdd);display:block;margin-bottom:8px;letter-spacing:.12em}
.arr-slot .pn{font-family:var(--fmono);font-weight:700;font-size:.6rem;letter-spacing:.04em;color:var(--ac,#fff);
  text-shadow:0 0 10px var(--acg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.arr-slot.sel{box-shadow:0 0 0 2px var(--pk),0 0 18px -4px rgba(233,30,140,.7);transform:translateY(-3px)}
.arr-slot.moved{border-style:dashed}
#winPanel{text-align:center}
#winPanel .wtitle{font-family:var(--fmono);font-weight:900;font-size:1.8rem;margin:16px 0;letter-spacing:.06em}
@media (min-width:760px){
  .chip{font-size:.74rem}
  .chip .tx{font-size:.66rem}
  .proto{font-size:.72rem}
  #hand{justify-content:center}
  .gauge{font-size:.66rem}
  .play-choice{flex-direction:row}
}
</style>
</head>
<body>

<header>
  <div class="hdr-row1">
    <div class="logo">COMPILE <b>AUTO</b></div>
    <span id="ctrlBadge">CTRL</span>
    <span id="turnBadge"></span>
  </div>
  <div class="hdr-actions">
    <button class="hbtn" id="speedBtn" onclick="cycleSpeed()"></button>
    <button class="hbtn" id="undoBtn" onclick="doUndo()">戻す</button>
    <button class="hbtn" onclick="openLog()">ログ</button>
    <button class="hbtn" onclick="openEditor()">編集</button>
    <button class="hbtn" onclick="confirmNew()">新規</button>
  </div>
</header>

<div id="msgBar" class="quiet"><span id="msgText"></span><span style="flex:1"></span>
  <button class="mb-btn" id="animSkipBtn" style="display:none" onclick="flushPlayback()">⏩ 飛ばす</button>
  <button class="mb-btn" id="skipBtn" style="display:none" onclick="reqSkip()">スキップ</button>
  <button class="mb-btn pri" id="okBtn" style="display:none" onclick="reqConfirm()">確定</button>
</div>

<div id="ctrlTop" class="ctrlbar"><span class="ct-ico">◆</span><span class="ct-tx"></span></div>
<main id="field"></main>
<div id="ctrlBot" class="ctrlbar"><span class="ct-ico">◆</span><span class="ct-tx"></span></div>

<!-- 選択中の確定/スキップ(親指で届く下部フローティング) -->
<div id="actionBar">
  <span id="abText"></span>
  <button class="ab-btn" id="abSkip" onclick="reqSkip()">スキップ</button>
  <button class="ab-btn pri" id="abOk" onclick="reqConfirm()">確定</button>
</div>

<div id="bottomBar">
  <div id="turnLog" onclick="openLog()"></div>
  <div id="sideInfo"></div>
  <div id="hand"></div>
</div>

<!-- セットアップ -->
<div class="ov on" id="setupOv"><div class="panel">
  <h2>COMPILE <b>AUTO PLAY</b></h2>
  <div class="sub">ルール・カード効果を完全自動処理。あなたのプロトコルを3つ選択してください(AIは残りからランダムに編成)。</div>
  <div class="pgrid" id="protoGrid"></div>
  <div class="row"><label><input type="checkbox" id="useCtrlCk" checked> コントロールコンポーネントを使う</label></div>

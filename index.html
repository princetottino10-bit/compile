<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COMPILE <!></title>
  <link rel="apple-touch-icon" href="ct-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--pk:#e91e8c;--bg:#0a0a0f;--cbg:#12121a;--bd:rgba(255,255,255,.08);--tx:#e0e0e8;--txd:#888}
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;
      -webkit-user-select:none;user-select:none;overflow-y:auto;overflow-x:hidden}
    .wrap{max-width:480px;margin:0 auto;padding:24px 16px 40px}
    .logo{font-family:Orbitron,monospace;font-size:1.6rem;font-weight:900;letter-spacing:2px;
      text-align:center;padding:32px 0 8px;color:var(--tx)}
    .logo em{font-style:normal;color:var(--pk)}
    .sub{text-align:center;font-size:.7rem;color:var(--txd);letter-spacing:1px;
      font-family:Orbitron,monospace;margin-bottom:32px}
    .cards{display:flex;flex-direction:column;gap:12px}
    .card{display:block;text-decoration:none;color:var(--tx);
      border:1.5px solid var(--bd);border-radius:12px;padding:18px 20px;
      background:var(--cbg);position:relative;overflow:hidden;
      transition:border-color .2s,background .2s,transform .15s}
    .card:active{transform:scale(.97)}
    .card .stripe{position:absolute;top:0;left:0;width:4px;height:100%}
    .card .icon{font-size:1.3rem;margin-bottom:6px}
    .card .name{font-family:Orbitron,monospace;font-size:.85rem;font-weight:700;letter-spacing:.5px}
    .card .desc{font-size:.7rem;color:var(--txd);margin-top:4px;line-height:1.5}
    .card:hover,.card:focus{border-color:rgba(255,255,255,.2);background:#16161f}
    .card.c1:hover{border-color:rgba(233,30,140,.4)}
    .card.c2:hover{border-color:rgba(59,130,246,.4)}
    .card.c3:hover{border-color:rgba(200,168,78,.4)}
    .card.c4:hover{border-color:rgba(34,197,94,.4)}
    .footer{text-align:center;margin-top:36px;font-size:.55rem;color:var(--txd);
      font-family:Orbitron,monospace;letter-spacing:.5px;line-height:1.8}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">COMPILE <em>&lt;!&gt;</em></div>
  <div class="sub">COMPANION TOOLS</div>
  <div class="cards">
    <a class="card c1" href="cardlist.html">
      <div class="stripe" style="background:#e91e8c"></div>
      <div class="icon">&#x1F0CF;</div>
      <div class="name">CARD LIST</div>
      <div class="desc">カード一覧 / 逆引き検索 / デッキ分析</div>
    </a>
    <a class="card c2" href="solo-play.html">
      <div class="stripe" style="background:#3b82f6"></div>
      <div class="icon">&#x1F3AE;</div>
      <div class="name">SOLO PLAY</div>
      <div class="desc">一人回し / 両面操作 / VS AI</div>
    </a>
    <a class="card c3" href="room-play.html">
      <div class="stripe" style="background:#c8a84e"></div>
      <div class="icon">&#x1F310;</div>
      <div class="name">ONLINE ROOM</div>
      <div class="desc">オンライン対戦 / リアルタイムマッチ</div>
    </a>
    <a class="card c4" href="control-tracker.html">
      <div class="stripe" style="background:#22c55e"></div>
      <div class="icon">&#x1F3AF;</div>
      <div class="name">CONTROL TRACKER</div>
      <div class="desc">コントロールマーカー管理</div>
    </a>
  </div>
  <div class="footer">
    FAN-MADE COMPANION APP<br>
    NOT AFFILIATED WITH THE OFFICIAL GAME
  </div>
</div>
</body>
</html>

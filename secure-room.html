<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>COMPILE - Secure Room</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auto-play-ui.css">
<style>
.hidden{display:none!important}
.room-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.room-input{flex:1;min-width:150px;background:var(--cbg);border:1px solid var(--bd2);color:var(--tx);border-radius:8px;padding:10px;font:inherit}
.room-status{min-height:1.5em;color:var(--txd);font-size:.7rem;margin-top:8px}
.room-status.err{color:#ff7784}.room-status.ok{color:var(--cand)}
.room-code{font-family:var(--fmono);font-size:1.8rem;font-weight:900;letter-spacing:.18em;color:var(--gd2);text-align:center;padding:10px}
.room-actions{display:flex;gap:7px;flex-wrap:wrap}
.room-actions .optbtn{flex:1;margin:0;text-align:center}
#roomPlayers{font-size:.62rem;color:var(--txd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#cardTip{display:none;position:fixed;z-index:80;max-width:330px;padding:10px 12px;border-radius:10px;
 background:rgba(16,16,27,.98);border:1px solid var(--ac,var(--bd2));box-shadow:0 12px 36px -8px #000;
 pointer-events:none;font-size:.66rem;line-height:1.45}
#cardTip.on{display:block}#cardTip b{font-family:var(--fmono);color:#fff}#cardTip .tiprow{margin-top:4px}
#cardTip .lbl{font:700 .5rem var(--fmono);color:var(--pk2);margin-right:6px}
.choice-row{display:flex;gap:6px;flex-wrap:wrap}.choice-row .mb-btn{display:block!important}
.proto-select-note{font-size:.68rem;color:var(--txd);margin-bottom:9px}
#setupPanel .pchip.taken{opacity:.25;pointer-events:none}
#setupPanel .pchip.sel{border-color:var(--pk2);box-shadow:0 0 0 1px var(--pk2),0 0 18px -5px var(--pk2)}
#setupPanel .pchip small{display:block;color:var(--txd);font-family:'Noto Sans JP';font-size:.52rem;margin-top:4px}
#setupPanel .pchip.sel small{color:#fff}
#setupPanel .wait{text-align:center;color:var(--txd);font-size:.76rem;padding:9px}
#setupPanel .home-link{display:block;text-align:center;color:var(--txd);font-size:.68rem;margin-top:12px}
.hcard.locked{opacity:.42;cursor:default}.line.remote-wait{opacity:.78}
.lobby-list{display:flex;flex-direction:column;gap:7px;margin-top:12px;max-height:290px;overflow-y:auto}
.lobby-room{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px 11px;
 background:rgba(255,255,255,.025);border:1px solid var(--bd2);border-radius:9px}
.lobby-room .title{font-weight:700;font-size:.76rem}.lobby-room .meta{font-size:.58rem;color:var(--txd);margin-top:3px}
.lobby-empty{text-align:center;color:var(--txd);font-size:.7rem;padding:18px 8px;border:1px dashed var(--bd2);border-radius:9px}
.room-create-grid{display:grid;grid-template-columns:1fr 120px;gap:7px}.room-create-grid .wide{grid-column:1/-1}
@media(max-width:700px){
  #roomPlayers{max-width:100px}
  .room-code{font-size:1.45rem}
  #setupPanel{padding:16px}
}
</style>
</head>
<body>
<header>
  <div class="hdr-row1">
    <div class="logo">COMPILE <b>ROOM</b></div>
    <span id="ctrlBadge">CTRL</span>
    <span id="turnBadge">OFFLINE</span>
  </div>
  <div class="hdr-actions">
    <span id="roomPlayers"></span>
    <button class="hbtn" id="roomBtn" onclick="openRoomInfo()">ルーム</button>
    <button class="hbtn" onclick="newRoom()">新規</button>
    <a class="hbtn" href="index.html" style="text-decoration:none">HOME</a>
  </div>
</header>

<div id="msgBar" class="quiet"><span id="msgText">接続してください</span><span style="flex:1"></span>
  <span class="choice-row" id="quickChoices"></span>
  <button class="mb-btn" id="skipBtn" style="display:none" onclick="requestSkip()">スキップ</button>
  <button class="mb-btn pri" id="okBtn" style="display:none" onclick="requestConfirm()">確定</button>
</div>

<div id="ctrlTop" class="ctrlbar"><span class="ct-ico">◆</span><span class="ct-tx"></span></div>
<main id="field"></main>
<div id="ctrlBot" class="ctrlbar"><span class="ct-ico">◆</span><span class="ct-tx"></span></div>

<div id="actionBar">
  <span id="abText"></span>
  <button class="ab-btn" id="abSkip" onclick="requestSkip()">スキップ</button>
  <button class="ab-btn pri" id="abOk" onclick="requestConfirm()">確定</button>
</div>

<div id="bottomBar">
  <div id="turnLog"></div>
  <div id="sideInfo"></div>
  <div id="hand"></div>
</div>

<div class="ov on" id="setupOv"><div class="panel" id="setupPanel"></div></div>
<div class="ov" id="modalOv"><div class="panel" id="modalPanel"></div></div>
<div id="cardTip"></div>

<script src="vendor/supabase-2.108.2.js"></script>
<script src="secure-room-config.js"></script>
<script>
'use strict';
var cfg=window.COMPILE_ROOM_CONFIG||{},sb=null,session=null,room=null,timer=null,cards=null;
var DEFMAP={},PROTOMAP={},selectedProtocols=[],selectedHand=null,selBuf=[],busy=false,lobbyRooms=[],lobbyTimer=null;
var widthMedia=window.matchMedia('(max-width:700px)'),hoverMedia=window.matchMedia('(hover:hover) and (pointer:fine)');
var MOBILE_UI=widthMedia.matches||!hoverMedia.matches;
document.documentElement.classList.toggle('mobile-ui',MOBILE_UI);
function onUiMedia(){MOBILE_UI=widthMedia.matches||!hoverMedia.matches;document.documentElement.classList.toggle('mobile-ui',MOBILE_UI);renderGame()}
if(widthMedia.addEventListener)widthMedia.addEventListener('change',onUiMedia);
if(hoverMedia.addEventListener)hoverMedia.addEventListener('change',onUiMedia);
var $=function(id){return document.getElementById(id)};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function configured(){return /^https:\/\//.test(cfg.url||'')&&String(cfg.anonKey||'').length>20}
function setStatus(text,type){var el=$('setupStatus');if(el){el.textContent=text||'';el.className='room-status'+(type?' '+type:'')}}
function hexToRgb(h){var n=parseInt(String(h||'#888').replace('#',''),16)||0x888888;return[(n>>16)&255,(n>>8)&255,n&255]}
function setAccent(el,hex){var c=hexToRgb(hex),l=c.map(function(v){return Math.round(v+(255-v)*.45)});el.style.setProperty('--ac','rgb('+l.join(',')+')');el.style.setProperty('--acg','rgba('+l.join(',')+',.5)');el.style.setProperty('--act','rgba('+c.join(',')+',.18)')}
function artBg(url,overlay){return overlay+',url("'+url+'") center/cover,var(--cbg)'}
function cardArt(id){var d=DEFMAP[id];return d?encodeURI('art/'+d.card.number+d.proto.name.toLowerCase()+'.webp'):''}
function protoArt(name,glitched){var cap=name.charAt(0)+name.slice(1).toLowerCase();return encodeURI('art/'+cap+(glitched?'_Glitched':'')+'.webp')}
function cardName(id){var d=DEFMAP[id];return d?d.proto.name+' '+d.card.value:(id||'裏向きカード')}
function effIcons(d){var u=d&&d.card.upper,l=d&&d.card.lower;return(!u&&!l)?'':'<span class="eff">'+(u?'<i class="e-up">▲</i>':'')+(l?'<i class="e-low">▼</i>':'')+'</span>'}
function initMaps(){cards.protocols.forEach(function(p){PROTOMAP[p.name]=p;p.cards.forEach(function(c){DEFMAP[c.id]={proto:p,card:c}})})}

async function boot(){
  cards=await fetch('data/cards.json').then(function(r){return r.json()});initMaps();
  if(!configured()){renderSetup('config');return}
  sb=window.supabase.createClient(cfg.url,cfg.anonKey,{auth:{persistSession:true,autoRefreshToken:true}});
  var got=await sb.auth.getSession();session=got.data.session;
  renderSetup(session?'lobby':'login');
}
function renderSetup(mode){
  var p=$('setupPanel'),html='<h2>COMPILE <b>SECURE ROOM</b></h2>';
  if(lobbyTimer){clearInterval(lobbyTimer);lobbyTimer=null}
  $('setupOv').classList.add('on');
  if(mode==='config'){
    html+='<div class="sub">Supabase設定が必要です。</div>';
  }else if(mode==='login'){
    html+='<div class="sub">表示名だけで匿名接続します。メールアドレスやパスワードは不要です。</div>'+
      '<div class="room-form"><input class="room-input" id="nameInput" maxlength="20" placeholder="表示名" value="'+esc(localStorage.getItem('compileRoomName')||'')+'">'+
      '<button class="bigbtn" style="margin:0" onclick="login()">接続</button></div>';
  }else if(mode==='lobby'){
    html+='<div class="sub">公開ルームへ参加するか、部屋を作成します。招待専用は一覧に表示されません。</div>'+
      '<div class="room-create-grid"><input class="room-input" id="titleInput" maxlength="30" placeholder="部屋名" value="対戦募集">'+
      '<select class="room-input" id="visibilityInput"><option value="public">公開</option><option value="private">招待専用</option></select>'+
      '<input class="room-input wide" id="passwordInput" maxlength="40" type="password" placeholder="パスワード (任意・4文字以上)">'+
      '<button class="bigbtn wide" style="margin:0" onclick="createRoom()">ルームを作る</button></div>'+
      '<div class="fx-set-lbl" style="margin-top:16px">募集中ルーム <button class="hbtn" onclick="loadLobbyRooms()">更新</button></div>'+
      '<div class="lobby-list" id="lobbyList"><div class="lobby-empty">読み込み中…</div></div>'+
      '<div class="fx-set-lbl" style="margin-top:14px">コードで参加</div>'+
      '<div class="room-form"><input class="room-input" id="codeInput" maxlength="6" placeholder="6桁コード" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z2-9]/g,\'\')">'+
      '<input class="room-input" id="joinPasswordInput" maxlength="40" type="password" placeholder="パスワード (必要な場合)">'+
      '<button class="optbtn" style="margin:0" onclick="joinRoom()">参加</button></div>';
  }else if(mode==='waiting'){
    html+='<div class="fx-set-lbl">'+esc(room.title||'対戦募集')+'</div><div class="room-code">'+esc(room.code)+'</div>'+
      '<div class="wait">'+(room.names[1]?'対戦相手が参加しました。プロトコルを選択してください。':'このコードを相手へ共有して、参加を待ってください。')+'</div>'+
      '<div class="room-actions"><button class="optbtn" onclick="copyCode()">コードをコピー</button></div>';
  }else if(mode==='protocols'){
    var other=(room.protocols&&room.protocols[1-room.side])||[];
    selectedProtocols=selectedProtocols.filter(function(n){return other.indexOf(n)<0});
    html+='<div class="sub">使用するプロトコルを3つ選択してください。相手が選んだものは使用できません。</div>'+
      '<div class="pgrid" id="protoGrid">'+cards.protocols.map(function(pr){var taken=other.indexOf(pr.name)>=0,sel=selectedProtocols.indexOf(pr.name)>=0;
        return '<div class="pchip'+(taken?' taken':'')+(sel?' sel':'')+'" data-name="'+esc(pr.name)+'" onclick="toggleProtocol(this)">'+esc(pr.name)+'<small>'+esc(taken?'相手が選択済み':pr.tags||'')+'</small></div>'}).join('')+'</div>'+
      '<button class="bigbtn" '+(selectedProtocols.length===3?'':'disabled')+' onclick="readyProtocols()">準備完了 ('+selectedProtocols.length+'/3)</button>';
  }
  html+='<div class="room-status" id="setupStatus"></div><a class="home-link" href="index.html">← HOME</a>';
  p.innerHTML=html;
  if(mode==='lobby'){loadLobbyRooms();lobbyTimer=setInterval(loadLobbyRooms,5000)}
}
async function login(){var n=$('nameInput').value.trim();if(!n){setStatus('表示名を入力してください','err');return}setStatus('接続中…');localStorage.setItem('compileRoomName',n);var r=await sb.auth.signInAnonymously({options:{data:{display_name:n}}});if(r.error){setStatus(r.error.message,'err');return}session=r.data.session;renderSetup('lobby')}
async function api(op,extra){var s=(await sb.auth.getSession()).data.session;if(!s)throw new Error('セッションが切れました');var r=await fetch(cfg.url+'/functions/v1/secure-room',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.access_token,'apikey':cfg.anonKey},body:JSON.stringify(Object.assign({op:op},extra||{}))});var d=await r.json();if(!r.ok)throw new Error(d.error||'通信エラー');return d}
async function loadLobbyRooms(){var list=$('lobbyList');if(!list)return;try{var data=await api('list');lobbyRooms=data.rooms||[];if(!$('lobbyList'))return;list.innerHTML=lobbyRooms.length?lobbyRooms.map(function(r){return '<div class="lobby-room"><div><div class="title">'+(r.locked?'[鍵] ':'')+esc(r.title)+'</div><div class="meta">HOST '+esc(r.hostName)+' · '+esc(r.code)+'</div></div><button class="optbtn" style="margin:0" onclick="joinListed(\''+r.code+'\','+(r.locked?'true':'false')+')">参加</button></div>'}).join(''):'<div class="lobby-empty">現在、募集中の公開ルームはありません。</div>'}catch(e){if(list)list.innerHTML='<div class="lobby-empty">一覧を取得できませんでした。</div>'}}
async function createRoom(){if(busy)return;var password=$('passwordInput').value;if(password&&password.length<4){setStatus('パスワードは4文字以上です','err');return}busy=true;try{room=await api('create',{name:localStorage.getItem('compileRoomName'),title:$('titleInput').value,visibility:$('visibilityInput').value,password:password});enterRoom()}catch(e){setStatus(e.message,'err')}finally{busy=false}}
function joinListed(code,locked){var password=locked?prompt('ルームパスワードを入力してください')||'':'';if(locked&&!password)return;joinRoom(code,password)}
async function joinRoom(listCode,listPassword){var code=listCode||$('codeInput').value,password=listCode?listPassword:$('joinPasswordInput').value;if(code.length!==6){setStatus('6桁コードを入力してください','err');return}busy=true;try{room=await api('join',{name:localStorage.getItem('compileRoomName'),code:code,password:password});enterRoom()}catch(e){setStatus(e.message,'err')}finally{busy=false}}
function enterRoom(){if(lobbyTimer){clearInterval(lobbyTimer);lobbyTimer=null}selectedProtocols=[];renderRoom();if(timer)clearInterval(timer);timer=setInterval(syncRoom,1300)}
async function syncRoom(){if(!room||busy)return;try{var next=await api('get',{code:room.code});var changed=next.version!==room.version||next.status!==room.status;room=next;if(changed){selectedHand=null;selBuf=[]}renderRoom()}catch(e){setMessage(e.message,true)}}
function renderRoom(){
  if(!room)return;
  if(room.status==='playing'||room.status==='finished'){$('setupOv').classList.remove('on');renderGame();return}
  renderSetup(room.names[1]?'protocols':'waiting');
}
function toggleProtocol(el){var n=el.dataset.name,i=selectedProtocols.indexOf(n);if(el.classList.contains('taken'))return;if(i>=0)selectedProtocols.splice(i,1);else if(selectedProtocols.length<3)selectedProtocols.push(n);renderSetup('protocols')}
async function readyProtocols(){if(selectedProtocols.length!==3||busy)return;busy=true;try{room=await api('protocols',{code:room.code,protocols:selectedProtocols});renderRoom()}catch(e){setStatus(e.message,'err')}finally{busy=false}}
function copyCode(){navigator.clipboard&&navigator.clipboard.writeText(room.code);setStatus('コードをコピーしました','ok')}
function newRoom(){if(timer)clearInterval(timer);timer=null;room=null;selectedHand=null;selBuf=[];$('field').innerHTML='';$('hand').innerHTML='';renderSetup(session?'lobby':'login')}
function openRoomInfo(){if(!room){renderSetup(session?'lobby':'login');return}openModal('<h2>'+esc(room.title||'SECURE ROOM')+'</h2><div class="room-code">'+esc(room.code)+'</div><div class="sub">'+esc((room.names[0]||'')+' vs '+(room.names[1]||'待機中'))+'</div><button class="optbtn" onclick="copyCode()">コードをコピー</button><button class="optbtn ghost" onclick="closeModal()">閉じる</button>')}

function renderGame(){
  if(!room||!room.game)return;
  var g=room.game,me=room.side,op=1-me;
  $('roomPlayers').textContent=(room.names[me]||'YOU')+' vs '+(room.names[op]||'OPPONENT');
  var tb=$('turnBadge');tb.textContent=g.winner!==null?(g.winner===me?'YOU WIN':'YOU LOSE'):(g.turn===me?'YOUR TURN':'OPPONENT');tb.className=g.turn===me?'me':'ai';
  var cb=$('ctrlBadge');cb.textContent=g.control===-1?'CTRL':(g.control===me?'◆ CTRL YOU':'◆ CTRL OPP');cb.className=g.control===me?'me':(g.control===op?'ai':'');
  renderControl(g,me,op);renderField(g,me,op);renderSideInfo(g,me,op);renderHand(g,me);renderRequestUi(g,me);
}
function renderControl(g,me,op){var top=$('ctrlTop'),bot=$('ctrlBot');top.classList.toggle('on',g.control===op);bot.classList.toggle('on',g.control===me);if(g.control===op)top.querySelector('.ct-tx').textContent='CONTROL · '+(room.names[op]||'OPPONENT');if(g.control===me)bot.querySelector('.ct-tx').textContent='CONTROL · YOU'}
function renderField(g,me,op){
  var f=$('field');f.innerHTML='';
  for(var l=0;l<3;l++){
    var col=document.createElement('div');col.className='line';col.dataset.line=l;
    var req=room.request;
    if(req&&req.kind==='pickLine'&&(req.lines||[]).indexOf(l)>=0){col.classList.add('cand');col.onclick=(function(line){return function(){sendChoice([line])}})(l)}
    var top=document.createElement('div');top.className='half top';var os=document.createElement('div');os.className='stack p2s';
    g.lines[l][op].forEach(function(c,i){os.appendChild(cardChip(c,op,i===g.lines[l][op].length-1))});top.appendChild(os);col.appendChild(top);
    var center=document.createElement('div');center.className='lcenter';center.appendChild(protoDiv(g.protocols[op][l],op,l));
    var ot=g.totals[l][op],mt=g.totals[l][me],tot=document.createElement('div');tot.className='totals';
    tot.innerHTML='<div class="gauge g2 t2'+(ot>=10&&ot>mt?' ready':'')+'"><span class="lbl">OPP</span><div class="bar"><i style="width:'+Math.min(ot*10,100)+'%"></i></div><span class="num">'+ot+'</span></div>'+
      '<div class="gauge t1'+(mt>=10&&mt>ot?' ready':'')+'"><span class="lbl">YOU</span><div class="bar"><i style="width:'+Math.min(mt*10,100)+'%"></i></div><span class="num">'+mt+'</span></div>';
    center.appendChild(tot);center.appendChild(protoDiv(g.protocols[me][l],me,l));col.appendChild(center);
    var bot=document.createElement('div');bot.className='half bot';var ms=document.createElement('div');ms.className='stack p1s';
    g.lines[l][me].forEach(function(c,i){ms.appendChild(cardChip(c,me,i===g.lines[l][me].length-1))});bot.appendChild(ms);col.appendChild(bot);
    if(selectedHand){
      var opts=(room.legalActions||[]).filter(function(a){return a.type==='play'&&a.card===selectedHand&&a.line===l});
      if(opts.length){col.classList.add('playable');var pc=document.createElement('div');pc.className='play-choice';
        if(opts.some(function(a){return a.faceUp})){var up=document.createElement('button');up.textContent='▶ 表でプレイ';up.onclick=(function(line){return function(e){e.stopPropagation();playHere(line,true)}})(l);pc.appendChild(up)}
        if(opts.some(function(a){return !a.faceUp})){var dn=document.createElement('button');dn.textContent='▶ 裏でプレイ';dn.className='dnb';dn.onclick=(function(line){return function(e){e.stopPropagation();playHere(line,false)}})(l);pc.appendChild(dn)}
        col.appendChild(pc);
      }else col.classList.add('not-target');
    }
    f.appendChild(col);top.scrollTop=0;bot.scrollTop=bot.scrollHeight;
  }
}
function protoDiv(p,side,line){var d=document.createElement('div');d.className='proto'+(p.compiled?' comp':'');setAccent(d,(PROTOMAP[p.name]||{}).color);d.style.background=artBg(protoArt(p.name,p.compiled),'linear-gradient(180deg,rgba(7,7,13,.48),rgba(7,7,13,.8))');d.textContent=p.name;d.onclick=function(e){e.stopPropagation();openProtocol(p,side,line)};return d}
function cardChip(c,side,uncovered){var d=document.createElement('div'),def=c.def&&DEFMAP[c.def];d.dataset.uid=c.uid;
  if(c.faceUp&&def){d.className='chip up art '+(side===room.side?'p1c':'p2c')+(uncovered?'':' cov');setAccent(d,def.proto.color);d.style.background=artBg(cardArt(c.def),'linear-gradient(100deg,rgba(7,7,13,.92),rgba(7,7,13,.68))');d.innerHTML='<span class="top"><span class="badge">'+c.value+'</span><span class="nm">'+esc(cardName(c.def))+'</span>'+effIcons(def)+'</span>'+(uncovered?'':(def.card.upper?'<span class="tx">'+esc(def.card.upper)+'</span>':''))}
  else{d.className='chip dn'+(uncovered?'':' cov');if(def)setAccent(d,def.proto.color);d.innerHTML='<span class="top"><span class="badge">'+c.value+'</span><span class="nm">'+(def?esc(cardName(c.def))+' (裏)':'??? (裏)')+'</span></span>'}
  var req=room.request,candidate=req&&req.kind==='pickCard'&&(req.candidates||[]).indexOf(c.uid)>=0;if(candidate){d.classList.add('cand');if(selBuf.indexOf(c.uid)>=0)d.classList.add('selbuf');d.onclick=function(e){e.stopPropagation();toggleCandidate(c.uid)}}else d.onclick=function(e){e.stopPropagation();if(def&&MOBILE_UI)openCard(c.def)};
  if(def)attachTip(d,c.def);return d}
function renderSideInfo(g,me,op){var c=g.counts;$('sideInfo').innerHTML='<span class="zone ai-tag">OPP 手札 <b>'+c[op].hand+'</b></span><span class="zone ai-tag">デッキ <b>'+c[op].deck+'</b></span><span class="zone ai-tag" onclick="openTrash(' + op + ')">トラッシュ <b>'+c[op].trash+'</b></span><span style="flex:1"></span><span class="zone">デッキ <b>'+c[me].deck+'</b></span><span class="zone" onclick="openTrash('+me+')">トラッシュ <b>'+c[me].trash+'</b></span>'+(canRefresh()?'<button class="hbtn" style="border-color:var(--pk);color:var(--pk2)" onclick="doRefresh()">リフレッシュ</button>':'')}
function renderHand(g,me){var h=$('hand');h.innerHTML='';g.hand.forEach(function(c){var def=DEFMAP[c.def],d=document.createElement('div');d.className='hcard';d.dataset.uid=c.uid;setAccent(d,def.proto.color);d.style.background=artBg(cardArt(c.def),'linear-gradient(180deg,rgba(7,7,13,.18),rgba(7,7,13,.5) 38%,rgba(7,7,13,.93))');if(selectedHand===c.uid)d.classList.add('sel');var req=room.request,cand=req&&req.kind==='pickHand'&&(req.candidates||[]).indexOf(c.uid)>=0;if(cand){d.classList.add('cand');if(selBuf.indexOf(c.uid)>=0)d.classList.add('selbuf')}if(g.turn!==me&&!cand)d.classList.add('locked');d.innerHTML='<span class="top"><span class="badge">'+def.card.value+'</span><span class="nm">'+esc(MOBILE_UI?def.proto.name.slice(0,3):cardName(c.def))+'</span></span>'+(!MOBILE_UI?effIcons(def):'');d.onclick=function(){tapHand(c.uid)};attachTip(d,c.def);h.appendChild(d)});if(!g.hand.length)h.innerHTML='<div style="color:var(--txdd);font-size:.7rem;align-self:center;padding:0 10px">手札なし</div>'}
function tapHand(uid){var req=room.request;if(req&&req.kind==='pickHand'&&(req.candidates||[]).indexOf(uid)>=0){toggleCandidate(uid);return}if(!room.legalActions||!room.legalActions.some(function(a){return a.type==='play'&&a.card===uid})){var c=room.game.hand.find(function(x){return x.uid===uid});if(c&&MOBILE_UI)openCard(c.def);return}selectedHand=selectedHand===uid?null:uid;renderGame()}
function playHere(line,faceUp){if(!selectedHand)return;sendAction({type:'play',card:selectedHand,line:line,faceUp:faceUp})}
function canRefresh(){return !room.request&&(room.legalActions||[]).some(function(a){return a.type==='refresh'})}
function doRefresh(){sendAction({type:'refresh'})}

function promptText(q){var map={'control-rearrange':'コントロールで並べ替える対象を選択','rearrange':'プロトコルを並べ替えてください'};return map[q.prompt]||'効果の処理を選択してください'}
function renderRequestUi(g,me){var q=room.request,quick=$('quickChoices'),skip=$('skipBtn'),ok=$('okBtn'),ab=$('actionBar');quick.innerHTML='';skip.style.display='none';ok.style.display='none';ab.classList.remove('on');
  if(g.winner!==null){setMessage(g.winner===me?'YOU WIN':'YOU LOSE');return}
  if(!q){setMessage(g.turn===me?(selectedHand?'プレイするラインと向きを選択':'あなたのターン: 手札をプレイするかリフレッシュ'):'相手の操作を待っています',g.turn!==me);return}
  setMessage(promptText(q));var add=function(label,picks){var b=document.createElement('button');b.className='mb-btn';b.textContent=label;b.onclick=function(){sendChoice(picks)};quick.appendChild(b)};
  if(q.kind==='yesNo'){add('はい',['yes']);add('いいえ',[])}
  else if(q.kind==='option')(q.options||[]).forEach(function(x,i){add(String(x||('選択肢 '+(i+1))),[i])});
  else if(q.kind==='arrange'){var orders=q.exact==='transposition'?[[1,0,2],[0,2,1],[2,1,0]]:[[1,2,0],[2,0,1],[0,2,1],[1,0,2],[2,1,0]];orders.forEach(function(o){add(o.map(function(i){return q.current[i]}).join(' > '),o)})}
  else if(q.kind==='pickCard'||q.kind==='pickHand'){var min=q.min==null?1:q.min,max=q.max==null?1:q.max;ab.classList.add('on');$('abText').textContent=selBuf.length+' / '+min+'〜'+max+'枚';$('abOk').disabled=selBuf.length<min||selBuf.length>max;$('abSkip').style.display=(q.optional||min===0)?'':'none'}
  if(q.optional||q.min===0)skip.style.display='';
}
function setMessage(text,quiet){$('msgText').textContent=text||'';$('msgBar').classList.toggle('quiet',!!quiet)}
function toggleCandidate(uid){var q=room.request,i=selBuf.indexOf(uid),max=q.max==null?1:q.max;if(i>=0)selBuf.splice(i,1);else if(selBuf.length<max)selBuf.push(uid);renderGame()}
function requestConfirm(){if(room.request)sendChoice(selBuf.slice())}
function requestSkip(){if(room.request)sendChoice([])}
function sendChoice(picks){sendAction({type:'choose',id:room.request.id,picks:picks})}
async function sendAction(action){if(busy)return;busy=true;try{room=await api('action',{code:room.code,version:room.version,action:action});selectedHand=null;selBuf=[];renderRoom()}catch(e){setMessage(e.message);await syncRoom()}finally{busy=false}}

function attachTip(el,defId){if(MOBILE_UI)return;el.addEventListener('mouseenter',function(e){showTip(defId,e)});el.addEventListener('mousemove',moveTip);el.addEventListener('mouseleave',hideTip)}
function showTip(id,e){var d=DEFMAP[id],t=$('cardTip');if(!d)return;setAccent(t,d.proto.color);t.innerHTML='<b>'+esc(cardName(id))+'</b>'+detailRows(d);t.classList.add('on');moveTip(e)}
function moveTip(e){var t=$('cardTip'),x=Math.min(e.clientX+14,window.innerWidth-350),y=Math.min(e.clientY+14,window.innerHeight-180);t.style.left=Math.max(6,x)+'px';t.style.top=Math.max(6,y)+'px'}
function hideTip(){$('cardTip').classList.remove('on')}
function detailRows(d){function row(lbl,tx){return tx?'<div class="tiprow"><span class="lbl">'+lbl+'</span>'+esc(tx)+'</div>':''}return row('TOP',d.card.upper)+row('MID',d.card.middle)+row('BOT',d.card.lower)}
function openCard(id){var d=DEFMAP[id];if(!d)return;openModal('<h2 style="color:'+d.proto.color+'">'+esc(cardName(id))+'</h2><div class="detail-cmd">'+detailRows(d)+'</div><button class="optbtn ghost" onclick="closeModal()">閉じる</button>')}
function openProtocol(p,side,line){var pm=PROTOMAP[p.name]||{};openModal('<h2 style="color:'+pm.color+'">'+esc(p.name)+(p.compiled?' ✓ COMPILED':'')+'</h2><div class="sub">'+esc(side===room.side?'あなた':'相手')+'の'+['左','中央','右'][line]+'プロトコル</div><button class="optbtn ghost" onclick="closeModal()">閉じる</button>')}
function openTrash(side){var list=room.game.trash[side]||[];openModal('<h2>TRASH</h2><div class="sub">'+esc(side===room.side?'あなた':'相手')+'のトラッシュ</div>'+list.map(function(c){return '<button class="optbtn" onclick="openCard(\''+esc(c.def)+'\')">'+esc(cardName(c.def))+'</button>'}).join('')+'<button class="optbtn ghost" onclick="closeModal()">閉じる</button>')}
function openModal(html){$('modalPanel').innerHTML=html;$('modalOv').classList.add('on')}
function closeModal(){$('modalOv').classList.remove('on')}
$('modalOv').onclick=function(e){if(e.target===this)closeModal()};
boot();
</script>
</body>
</html>
